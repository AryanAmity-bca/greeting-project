<!DOCTYPE html>
<html>
<head>
    <title>Greeting</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #333;
            font-size: 30px;
            margin-bottom: 20px;
        }

        p {
            color: #666;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="card">
        <h1 id="message"></h1>
        <p>Have a wonderful day ahead 🌟</p>
        <button class="btn" onclick="goBack()">Go Back</button>
    </div>

    <!-- 🎉 Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        let name = localStorage.getItem("userName");
        let dob = localStorage.getItem("userDOB");

        let today = new Date();
        let todayDate = today.toISOString().split("T")[0];

        let message = "";

        if (dob === todayDate) {
            message = "🎉 Happy Birthday " + name + "!";

            // 🎊 CONFETTI EFFECT
            setTimeout(() => {
                confetti({
                    particleCount: 200,
                    spread: 120,
                    origin: { y: 0.6 }
                });
            }, 500);

        } else {
            message = "Hello " + name + " 😊 Welcome!";
        }

        document.getElementById("message").innerText = message;

        function goBack() {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
